spring:
  application:
    name: api-connector

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:${MONGODB_URI}}

server:
  port: ${SERVER_PORT:8081}

external-api:
  meta:
    seed-file: ${EXTERNAL_API_META_SEED_FILE:classpath:seed/external-api-metas.json}

  youth-center:
    enabled: ${EXTERNAL_API_YOUTH_CENTER_ENABLED:${YOUTH_CENTER_ENABLED:true}}
    base-url: ${EXTERNAL_API_YOUTH_CENTER_BASE_URL:${YOUTH_CENTER_BASE_URL:https://www.youthcenter.go.kr}}
    policy-path: ${EXTERNAL_API_YOUTH_CENTER_POLICY_PATH:${YOUTH_CENTER_POLICY_PATH:/go/ythip/getPlcy}}
    api-key: ${EXTERNAL_API_YOUTH_CENTER_API_KEY:${YOUTH_CENTER_API_KEY}}
    page-size: ${EXTERNAL_API_YOUTH_CENTER_PAGE_SIZE:${YOUTH_CENTER_PAGE_SIZE:100}}
    rtn-type: ${EXTERNAL_API_YOUTH_CENTER_RTN_TYPE:${YOUTH_CENTER_RTN_TYPE:json}}
    page-type: ${EXTERNAL_API_YOUTH_CENTER_PAGE_TYPE:${YOUTH_CENTER_PAGE_TYPE:1}}
    list-page-type: ${EXTERNAL_API_YOUTH_CENTER_LIST_PAGE_TYPE:${YOUTH_CENTER_LIST_PAGE_TYPE:1}}
    detail-page-type: ${EXTERNAL_API_YOUTH_CENTER_DETAIL_PAGE_TYPE:${YOUTH_CENTER_DETAIL_PAGE_TYPE:2}}

  card:
    card-gorilla:
      enabled: ${EXTERNAL_API_CARD_CARD_GORILLA_ENABLED:${CARD_GORILLA_ENABLED:true}}
      url: ${EXTERNAL_API_CARD_CARD_GORILLA_URL:${CARD_GORILLA_URL:https://www.card-gorilla.com/search/card?cate=CRD}}
    toss-card-lounge:
      enabled: ${EXTERNAL_API_CARD_TOSS_CARD_LOUNGE_ENABLED:${TOSS_CARD_LOUNGE_ENABLED:true}}
      url: ${EXTERNAL_API_CARD_TOSS_CARD_LOUNGE_URL:${TOSS_CARD_LOUNGE_URL:https://card-lounge.toss.im/}}

  insurance:
    data-go-kr-service-key: ${EXTERNAL_API_INSURANCE_DATA_GO_KR_SERVICE_KEY:${DATA_GO_KR_SERVICE_KEY}}

    indemnity:
      enabled: ${EXTERNAL_API_INSURANCE_INDEMNITY_ENABLED:${INDEMNITY_INSURANCE_ENABLED:true}}
      base-url: ${EXTERNAL_API_INSURANCE_INDEMNITY_BASE_URL:${INDEMNITY_INSURANCE_BASE_URL:http://apis.data.go.kr}}
      path: ${EXTERNAL_API_INSURANCE_INDEMNITY_PATH:${INDEMNITY_INSURANCE_PATH:/1160100/service/GetMedicalReimbursementInsuranceInfoService/getInsuranceInfo}}

    post-best:
      enabled: ${EXTERNAL_API_INSURANCE_POST_BEST_ENABLED:${POST_INSURANCE_BEST_ENABLED:true}}
      base-url: ${EXTERNAL_API_INSURANCE_POST_BEST_BASE_URL:${POST_INSURANCE_BEST_BASE_URL:https://apis.data.go.kr}}
      path: ${EXTERNAL_API_INSURANCE_POST_BEST_PATH:${POST_INSURANCE_BEST_PATH:/B552886/svc_postInsuBest/getPostInsuBestPrdt}}

    post-product:
      enabled: ${EXTERNAL_API_INSURANCE_POST_PRODUCT_ENABLED:${POST_INSURANCE_PRODUCT_ENABLED:true}}
      base-url: ${EXTERNAL_API_INSURANCE_POST_PRODUCT_BASE_URL:${POST_INSURANCE_PRODUCT_BASE_URL:https://apis.data.go.kr}}
      path: ${EXTERNAL_API_INSURANCE_POST_PRODUCT_PATH:${POST_INSURANCE_PRODUCT_PATH:/1721301/KrpostInsuranceProductView/InsuranceGoods}}

    post-coverage:
      enabled: ${EXTERNAL_API_INSURANCE_POST_COVERAGE_ENABLED:${POST_INSURANCE_COVERAGE_ENABLED:true}}
      base-url: ${EXTERNAL_API_INSURANCE_POST_COVERAGE_BASE_URL:${POST_INSURANCE_COVERAGE_BASE_URL:https://apis.data.go.kr}}
      path: ${EXTERNAL_API_INSURANCE_POST_COVERAGE_PATH:${POST_INSURANCE_COVERAGE_PATH:/1721301/KrpostInsuranceGuaranteeContentView/InsuranceGuranteeContent}}

    safe-insurance:
      enabled: ${EXTERNAL_API_INSURANCE_SAFE_INSURANCE_ENABLED:${SAFE_INSURANCE_ENABLED:true}}
      base-url: ${EXTERNAL_API_INSURANCE_SAFE_INSURANCE_BASE_URL:${SAFE_INSURANCE_BASE_URL:https://www.ins24.go.kr}}
      path: ${EXTERNAL_API_INSURANCE_SAFE_INSURANCE_PATH:${SAFE_INSURANCE_PATH:/api/safeInsrncInfoApi}}
      region-file: ${EXTERNAL_API_INSURANCE_SAFE_INSURANCE_REGION_FILE:classpath:seed/safe-insurance-seoul-regions.json}

sync:
  youth-policy:
    cron: ${SYNC_YOUTH_POLICY_CRON:${YOUTH_POLICY_SYNC_CRON:0 0 3 * * *}}
    zone: ${SYNC_YOUTH_POLICY_ZONE:${YOUTH_POLICY_SYNC_ZONE:Asia/Seoul}}

  card-product:
    cron: ${SYNC_CARD_PRODUCT_CRON:${CARD_PRODUCT_SYNC_CRON:0 0 4 * * *}}
    zone: ${SYNC_CARD_PRODUCT_ZONE:${CARD_PRODUCT_SYNC_ZONE:Asia/Seoul}}

  insurance-product:
    cron: ${SYNC_INSURANCE_PRODUCT_CRON:${INSURANCE_PRODUCT_SYNC_CRON:0 0 5 * * *}}
    zone: ${SYNC_INSURANCE_PRODUCT_ZONE:${INSURANCE_PRODUCT_SYNC_ZONE:Asia/Seoul}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.project.backend: DEBUG
