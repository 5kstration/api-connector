apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api-connector
  namespace: service
  labels:
    app: api-connector
spec:
  replicas: 1
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause:
          duration: 30s
      - setWeight: 50
      - pause:
          duration: 30s
  selector:
    matchLabels:
      app: api-connector
  template:
    metadata:
      labels:
        app: api-connector
    spec:
      containers:
        - name: api-connector
          image: registry.gitlab.com/5kstration/api-connector:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
          volumeMounts:
            - name: api-connector-config
              mountPath: /app/config/application.yml
              subPath: application.yml
              readOnly: true
            - name: api-connector-seed
              mountPath: /app/config/external-api-metas.json
              subPath: external-api-metas.json
              readOnly: true
            - name: api-connector-seed
              mountPath: /app/config/safe-insurance-seoul-regions.json
              subPath: safe-insurance-seoul-regions.json
              readOnly: true
          envFrom:
            - secretRef:
                name: api-connector-secret
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: api-connector-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: api-connector-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: api-connector-config
                  key: DB_NAME
            - name: AI_RDS_SYNC_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: api-connector-config
                  key: AI_RDS_SYNC_LIMIT
            - name: AI_RDS_SYNC_CREATE_TABLES
              valueFrom:
                configMapKeyRef:
                  name: api-connector-config
                  key: AI_RDS_SYNC_CREATE_TABLES
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: api-connector-secret
                  key: MONGODB_URI
            - name: EXTERNAL_API_YOUTH_CENTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-connector-secret
                  key: YOUTH_CENTER_API_KEY
            - name: EXTERNAL_API_INSURANCE_DATA_GO_KR_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-connector-secret
                  key: DATA_GO_KR_SERVICE_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      imagePullSecrets:
        - name: gitlab-registry-credentials
      volumes:
        - name: api-connector-config
          configMap:
            name: api-connector-config
        - name: api-connector-seed
          secret:
            secretName: api-connector-seed-secret
---
apiVersion: v1
kind: Service
metadata:
  name: api-connector
  namespace: service
  labels:
    app: api-connector
spec:
  type: ClusterIP
  selector:
    app: api-connector
  ports:
    - name: http
      port: 8081
      targetPort: http
